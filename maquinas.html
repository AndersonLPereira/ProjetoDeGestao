<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Máquinas - LB impressões 3D</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>

<body>
  <div class="overlay" onclick="toggleMenu()"></div>

  <div class="mobile-header">
    <button type="button" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    <h3>LB impressões 3D</h3>
    <div style="width: 30px;"></div>
  </div>

  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="logo-area">
        <a href="/ProjetoDeGestao/Telas/dashboard.html">
        <img src="Logo LB impressões 3D.png" alt="Logo LB" id="app-logo" a/>
        </a>
        <h2>LB impressões 3D</h2>
        <button class="close-menu-btn" type="button" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
      </div>

      <nav>
        <a href="/ProjetoDeGestao/Telas/dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/ProjetoDeGestao/Telas/orcamento.html" class="nav-link"><i class="fas fa-calculator"></i> Novo
          Orçamento</a>
        <a href="/ProjetoDeGestao/Telas/historico.html" class="nav-link"><i class="fas fa-list"></i> Histórico &
          Vendas</a>
        <a href="/ProjetoDeGestao/Telas/filamentos.html" class="nav-link"><i class="fas fa-circle-notch"></i>
          Filamentos</a>
        <a href="/ProjetoDeGestao/Telas/maquinas.html" class="nav-link"><i class="fas fa-print"></i> Máquinas</a>
        <a href="/ProjetoDeGestao/Telas/backup.html" class="nav-link nav-backup"><i class="fas fa-database"></i> Backup
          & Dados</a>
      </nav>
    </aside>

    <main class="content">
      <section id="maquinas" class="section active-section">
        <header>
          <h1>Cadastro de Máquinas</h1>
        </header>

        <div class="form-container">
          <div class="row">
            <div class="input-group">
              <label for="maq-nome">Nome/Modelo</label>
              <input type="text" id="maq-nome" placeholder="Ex: Bambu Lab X1C" />
            </div>
            <div class="input-group">
              <label for="maq-valor">Valor (R$)</label>
              <input type="number" id="maq-valor" placeholder="0.00" step="0.01" />
            </div>
          </div>

          <div class="row">
            <div class="input-group">
              <label for="maq-potencia">Consumo (W)</label>
              <input type="number" id="maq-potencia" placeholder="Ex: 350" />
            </div>
            <div class="input-group">
              <label for="maq-kwh">Energia (R$/kWh)</label>
              <input type="number" id="maq-kwh" placeholder="Ex: 0.90" step="0.01" />
            </div>
          </div>

          <div class="row">
            <div class="input-group">
              <label for="maq-vida">Vida Útil (Horas)</label>
              <input type="number" id="maq-vida" placeholder="Ex: 20000" value="3000" />
            </div>
          </div>

          <button class="btn-primary full-width" type="button" onclick="salvarMaquina()">Cadastrar Máquina</button>
        </div>

        <div class="table-responsive">
          <table id="tabela-maquinas">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Valor</th>
                <th>Potência</th>
                <th>Vida Útil</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js" defer></script>
</body>

</html>
