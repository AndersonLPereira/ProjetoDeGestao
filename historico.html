<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Histórico - LB impressões 3D</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
</head>

<body>
    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="mobile-header">
        <button type="button" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <h3>LB impressões 3D</h3>
        <div style="width: 30px;"></div>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo-area">
                <img src="Logo LB impressões 3D.png" alt="Logo LB" id="app-logo" />
                <h2>LB impressões 3D</h2>
                <button class="close-menu-btn" type="button" onclick="toggleMenu()"><i
                        class="fas fa-times"></i></button>
            </div>

            <nav>
                <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i>
                    Dashboard</a>
                <a href="orcamento.html" class="nav-link"><i class="fas fa-calculator"></i> Novo
                    Orçamento</a>
                <a href="historico.html" class="nav-link"><i class="fas fa-list"></i> Histórico &
                    Vendas</a>
                <a href="filamentos.html" class="nav-link"><i class="fas fa-circle-notch"></i>
                    Filamentos</a>
                <a href="maquinas.html" class="nav-link"><i class="fas fa-print"></i>
                    Máquinas</a>
                <a href="backup.html" class="nav-link nav-backup"><i class="fas fa-database"></i>
                    Backup & Dados</a>
            </nav>
        </aside>

        <main class="content">
            <section id="historico" class="section active-section">
                <header>
                    <h1>Histórico</h1>
                </header>

                <div class="table-responsive">
                    <table id="tabela-historico">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Cliente/Prod</th>
                                <th>Valores</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
